name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            ext: .exe
            archive: zip
          - goos: linux
            goarch: amd64
            ext: ''
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            ext: ''
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            ext: ''
            archive: tar.gz
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          mkdir -p staging
          go build -ldflags "-X main.version=$VERSION -X main.buildDate=$BUILD_DATE" \
            -o staging/claude-shuttle${{ matrix.ext }} \
            ./cmd/claude-shuttle

      - name: Package
        run: |
          mkdir -p dist
          ARCHIVE_NAME=claude-shuttle-${{ matrix.goos }}-${{ matrix.goarch }}
          cd staging
          if [ "${{ matrix.archive }}" = "zip" ]; then
            zip ../dist/${ARCHIVE_NAME}.zip *
          else
            tar czf ../dist/${ARCHIVE_NAME}.tar.gz *
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: claude-shuttle-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
